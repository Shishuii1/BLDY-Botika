name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ runner.os }}-node-${{ hashFiles('backend/package.json') }}
          restore-keys: backend-${{ runner.os }}-node-
      - name: Install backend dependencies
        run: npm install
        working-directory: backend
      - name: Run backend lint
        run: npm run lint
        working-directory: backend
      - name: Run backend tests
        run: npm test
        working-directory: backend

  web:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Cache web dependencies
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: web-${{ runner.os }}-node-${{ hashFiles('web/package.json') }}
          restore-keys: web-${{ runner.os }}-node-
      - name: Install web dependencies
        run: npm install
        working-directory: web
      - name: Run web lint
        run: npm run lint
        working-directory: web
      - name: Run web tests
        run: npm test
        working-directory: web
      - name: Build web
        run: npm run build
        working-directory: web
